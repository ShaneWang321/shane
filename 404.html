<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Page Not Found</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        background: #000;
        color: #f5f5f7;
    }

    .box {
        text-align: center;
        padding: 40px;
        background: rgba(255,255,255,0.05);
        border-radius: 20px;
        backdrop-filter: blur(20px);
        width: 85%;
        max-width: 420px;
    }

    h1 {
        font-size: 22px;
        margin-bottom: 10px;
    }

    p {
        color: #86868b;
        font-size: 14px;
        margin-bottom: 25px;
    }

    a {
        display: inline-block;
        padding: 10px 20px;
        border-radius: 999px;
        background: #0A84FF;
        color: white;
        text-decoration: none;
    }
</style>
</head>

<body>

<div class="box">
    <h1>Page Not Found</h1>
    <p>這個頁面不存在或已移動</p>

    <a id="btn" href="#">正在導回...</a>
</div>

<script>
/* ====== 你的兩個站 ====== */
const ROUTES = {
    dpdns: "https://shane.dpdns.org",
    vercel: "https://shane.vercel.app",
    default: "https://shane.vercel.app"
};

function detectTarget() {
    const params = new URLSearchParams(window.location.search);
    const from = params.get("from");
    const ref = document.referrer;

    let target = ROUTES.default;

    // 1️⃣ query ?from=
    if (from === "dpdns") target = ROUTES.dpdns;
    if (from === "vercel") target = ROUTES.vercel;

    // 2️⃣ referrer 判斷
    if (ref.includes("shane.dpdns.org")) target = ROUTES.dpdns;
    if (ref.includes("shane.vercel.app")) target = ROUTES.vercel;

    return target;
}

const target = detectTarget();

/* 按鈕 */
document.getElementById("btn").href = target;
document.getElementById("btn").innerText = "返回首頁";

/* 自動跳轉 */
setTimeout(() => {
    window.location.href = target;
}, 3000);
</script>

</body>
</html>
